name: Publish SentinelKafka Package to NuGet

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Version number for the release (e.g. 1.0.5)'
        required: true
        default: '1.0.0'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Build and Pack
        run: |
          cd SentinelKafka
          dotnet build --configuration Release
          
          # This natively natively overrides the explicit csproj Version flag dynamically without dangerous script parsing!
          dotnet pack --configuration Release --no-build -p:PackageVersion=${{ github.event.inputs.release_version }} -o ./nupkg

      - name: Push to NuGet.org
        run: |
          cd SentinelKafka
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
